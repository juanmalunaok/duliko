<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Duliko SRL</title>
<link rel="icon" type="image/png" href="assets/logo.png">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>
/* ===== VARIABLES CLARO / OSCURO ===== */
:root{
  --ad-bg:#F0F2F5;--ad-card:#fff;--ad-head-bg:#fff;--ad-head-border:#ECEEF3;
  --ad-sidebar:#1A1D2B;--ad-sidebar-text:rgba(255,255,255,.48);--ad-sidebar-hover:rgba(255,255,255,.06);
  --ad-sidebar-active-bg:rgba(200,149,108,.20);--ad-sidebar-active:#fff;
  --ad-label:rgba(255,255,255,.22);
  --ad-main:#F8F9FC;--ad-border:#ECEEF3;--ad-text:#1A1A2E;--ad-text2:#8A8FA8;
  --ad-input:#fff;--ad-input-border:#DDE0EA;
  --ad-row-alt:#F3F4F8;--ad-table-border:#ECEEF3;
}
[data-dark]{
  --ad-bg:#0C0E1A;--ad-card:#141627;--ad-head-bg:#141627;--ad-head-border:#1F2236;
  --ad-sidebar:#0F1120;--ad-sidebar-text:rgba(255,255,255,.38);--ad-sidebar-hover:rgba(255,255,255,.05);
  --ad-sidebar-active-bg:rgba(200,149,108,.16);--ad-sidebar-active:#EDEEFF;
  --ad-label:rgba(255,255,255,.16);
  --ad-main:#141627;--ad-border:#1F2236;--ad-text:#E2E4F3;--ad-text2:#565C80;
  --ad-input:#1A1D30;--ad-input-border:#272A40;
  --ad-row-alt:#191C2E;--ad-table-border:#1F2236;
}

/* ===== BASE ===== */
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:32px 16px;background:var(--ad-bg);transition:background .3s}
@media(max-width:768px){body{padding:0;background:var(--ad-card)}}

/* ===== TARJETA PRINCIPAL ===== */
.admin-page{width:100%;max-width:980px}
.admin-card{background:var(--ad-card);border-radius:20px;box-shadow:0 8px 48px rgba(0,0,0,.13);overflow:hidden;transition:background .3s}
@media(max-width:768px){.admin-card{border-radius:0;box-shadow:none}}

/* ===== HEADER ===== */
.admin-card-head{padding:18px 28px;border-bottom:1px solid var(--ad-head-border);display:flex;justify-content:space-between;align-items:center;background:var(--ad-head-bg);transition:background .3s,border-color .3s}
.admin-head-title{display:flex;align-items:center;gap:10px}
.admin-head-title img{width:28px;height:28px;border-radius:7px}
.admin-head-title h2{font-family:'Space Grotesk',sans-serif;font-size:1.2rem;font-weight:700;color:var(--ad-text)}
.admin-head-actions{display:flex;align-items:center;gap:8px}
.admin-dark-toggle{width:36px;height:36px;border-radius:10px;border:1px solid var(--ad-border);background:var(--ad-input);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.95rem;transition:all .2s;line-height:1}
.admin-dark-toggle:hover{border-color:var(--accent)}
.admin-back{color:var(--ad-text2);text-decoration:none;font-size:.82rem;background:var(--ad-input);padding:7px 14px;border-radius:9px;border:1px solid var(--ad-border);transition:all .2s;font-weight:500}
.admin-back:hover{color:var(--ad-text);border-color:var(--ad-text2)}

/* ===== LOGIN ===== */
.admin-login{text-align:center;padding:60px 32px}
.admin-login p{color:var(--ad-text2);margin-bottom:24px}
.admin-error{background:#FEF2F2;color:#991B1B;padding:12px 20px;border-radius:10px;margin-top:16px;font-size:.88rem;display:none}
.admin-dash{display:none}.admin-dash.show{display:block}

/* ===== LAYOUT: sidebar + contenido ===== */
.admin-layout{display:flex;min-height:560px}

/* SIDEBAR */
.admin-sidebar{width:210px;flex-shrink:0;background:var(--ad-sidebar);display:flex;flex-direction:column;padding:18px 10px 24px;gap:2px;transition:background .3s}
.admin-sidebar-label{font-size:.62rem;font-weight:700;color:var(--ad-label);text-transform:uppercase;letter-spacing:.1em;padding:10px 14px 4px;margin-top:6px}
.admin-sidebar-label:first-child{margin-top:0;padding-top:0}
.a-tab{padding:10px 14px;background:transparent;border:none;border-radius:10px;font-family:'Inter',sans-serif;font-size:.84rem;font-weight:500;cursor:pointer;transition:all .2s;color:var(--ad-sidebar-text);text-align:left;display:flex;align-items:center;gap:10px;width:100%;white-space:nowrap}
.a-tab:hover{background:var(--ad-sidebar-hover);color:#fff}
.a-tab.active{background:var(--ad-sidebar-active-bg);color:var(--ad-sidebar-active);font-weight:600}
.a-tab svg{width:15px;height:15px;flex-shrink:0;opacity:.6;transition:opacity .2s}
.a-tab.active svg,.a-tab:hover svg{opacity:1}

/* MAIN CONTENT */
.admin-main{flex:1;background:var(--ad-main);padding:28px;min-width:0;transition:background .3s}

/* ===== BARRA USUARIO ===== */
.admin-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--ad-border)}
.admin-bar p{color:var(--ad-text2);font-size:.82rem}
.btn-so{padding:7px 14px;border:1.5px solid var(--ad-border);border-radius:9px;background:transparent;cursor:pointer;font-family:'Inter',sans-serif;font-size:.82rem;font-weight:500;color:var(--ad-text2);transition:all .2s}
.btn-so:hover{border-color:#DC503C;color:#DC503C}

/* ===== TABS ===== */
.tab-c{display:none}.tab-c.active{display:block}

/* ===== DASHBOARD ===== */
.dash-recent h3{font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:700;color:var(--ad-text);margin-bottom:16px}
.dash-recent-table{width:100%;border-collapse:collapse}
.dash-recent-table th{font-size:.67rem;font-weight:700;color:var(--ad-text2);text-transform:uppercase;letter-spacing:.07em;padding:8px 10px;text-align:left;border-bottom:2px solid var(--ad-table-border)}
.dash-recent-table td{padding:11px 10px;border-bottom:1px solid var(--ad-table-border);font-size:.87rem;color:var(--ad-text);vertical-align:middle}
.dash-recent-table tbody tr:nth-child(even){background:var(--ad-row-alt)}
.dash-recent-table tr:last-child td{border-bottom:none}
.dash-td-img{display:flex;align-items:center;gap:10px}
.dash-td-img img{width:36px;height:36px;border-radius:8px;object-fit:cover;flex-shrink:0}
.dash-td-cat{color:var(--ad-text2);font-size:.82rem}

/* ===== FORMULARIO (dark fixes) ===== */
.f-group label{color:var(--ad-text2)}
.f-group input,.f-group select,.f-group textarea{background:var(--ad-input);border-color:var(--ad-input-border);color:var(--ad-text)}
.f-group input:focus,.f-group select:focus,.f-group textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
.f-group input::placeholder,.f-group textarea::placeholder{color:var(--ad-text2)}
.file-up{border-color:var(--ad-input-border);background:var(--ad-input)}
.file-up p,.file-up svg{color:var(--ad-text2)}
.stock-label{color:var(--ad-text2)}

/* ===== LISTA PRODUCTOS (dark) ===== */
.a-item{border-color:var(--ad-border);transition:background .2s}
.a-item:hover{background:var(--ad-row-alt)}
.a-info h4{color:var(--ad-text)}
.a-info span{color:var(--ad-text2)}
.drag-handle{cursor:grab;padding:0 6px;color:var(--ad-text2);font-size:1.3rem;user-select:none;flex-shrink:0;line-height:1;opacity:.5}
.drag-handle:active{cursor:grabbing}
.a-item.drag-over{border-top:2px solid var(--accent)}
.a-item[draggable=true]{transition:opacity .15s,background .2s}

/* ===== PORTADAS ===== */
.brand-cover-row{display:flex;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid var(--ad-border)}
.brand-cover-preview{width:80px;height:60px;border-radius:8px;overflow:hidden;background:var(--ad-input);flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1px solid var(--ad-border)}
.brand-cover-preview img{width:100%;height:100%;object-fit:cover}
.brand-cover-preview .no-img{font-size:.68rem;color:var(--ad-text2);text-align:center}
.brand-cover-info{flex:1;color:var(--ad-text)}

/* ===== MOBILE ===== */
@media(max-width:768px){
  .admin-card-head{padding:14px 20px}
  .admin-layout{flex-direction:column}
  .admin-sidebar{width:100%;flex-direction:row;flex-wrap:nowrap;overflow-x:auto;padding:10px 10px;gap:4px;scrollbar-width:none}
  .admin-sidebar::-webkit-scrollbar{display:none}
  .admin-sidebar-label{display:none}
  .a-tab{white-space:nowrap;padding:8px 12px;flex-shrink:0;width:auto;border-radius:8px}
  .admin-main{padding:20px}
}
</style>
</head>
<body>
<div class="admin-page">
  <div class="admin-card">
    <div class="admin-card-head">
      <div class="admin-head-title">
        <img src="assets/logo.png" alt="Duliko">
        <h2>Panel Admin</h2>
      </div>
      <div class="admin-head-actions">
        <button class="admin-dark-toggle" id="darkToggle" title="Modo oscuro">🌙</button>
        <a href="index.html" class="admin-back">← Volver al sitio</a>
      </div>
    </div>
    <div class="admin-card-body" style="padding:0">

<div class="admin-login" id="adminLogin">
  <p>Iniciá sesión con Google.</p>
  <button class="g-btn" id="googleSignIn"><svg viewBox="0 0 24 24" width="20" height="20"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Ingresar con Google</button>
  <div class="admin-error" id="adminError"></div>
</div>

<div class="admin-dash" id="adminDashboard">
  <div class="admin-layout">

    <!-- SIDEBAR -->
    <nav class="admin-sidebar">
      <span class="admin-sidebar-label">Principal</span>
      <button class="a-tab active" data-tab="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Resumen
      </button>
      <button class="a-tab" data-tab="add">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Agregar
      </button>
      <button class="a-tab" data-tab="list">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1.2" fill="currentColor" stroke="none"/><circle cx="3" cy="12" r="1.2" fill="currentColor" stroke="none"/><circle cx="3" cy="18" r="1.2" fill="currentColor" stroke="none"/></svg>
        Productos
      </button>
      <span class="admin-sidebar-label">Contenido</span>
      <button class="a-tab" data-tab="novedades">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        Novedades
      </button>
      <button class="a-tab" data-tab="archivos">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Archivos
      </button>
      <button class="a-tab" data-tab="portadas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Portadas
      </button>
    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="admin-main">
      <div class="admin-bar">
        <p id="adminUser"></p>
        <button class="btn-so" id="signOutBtn">Cerrar sesión</button>
      </div>

      <!-- RESUMEN -->
      <div id="tabDashboard" class="tab-c active">
        <div class="dash-recent">
          <h3>Últimos productos agregados</h3>
          <div id="dashRecentList"><p style="color:var(--ad-text2);font-size:.85rem">Cargando...</p></div>
        </div>
      </div>

      <!-- AGREGAR -->
      <div id="tabAdd" class="tab-c">
        <div class="f-grid">
          <div class="f-group"><label>Nombre</label><input type="text" id="pName" placeholder="Ej: Pretzels con sésamo"></div>
          <div class="f-group"><label>Marca</label>
            <select id="pCat" style="width:100%;padding:10px;border:1px solid var(--ad-input-border);border-radius:8px;font-family:var(--f-body);background:var(--ad-input);color:var(--ad-text)"><option value="">Seleccionar línea...</option></select>
            <div style="display:flex;gap:6px;margin-top:6px">
              <input type="text" id="newBrandInput" placeholder="Nueva línea/marca..." style="flex:1;padding:8px;border:1px solid var(--ad-input-border);border-radius:8px;font-family:var(--f-body);font-size:.85rem;background:var(--ad-input);color:var(--ad-text)">
              <button type="button" onclick="addBrand()" style="background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:.85rem">+</button>
            </div>
            <div id="brandsList" class="tags-wrap" style="margin-top:8px"></div>
          </div>
          <div class="f-group full"><label>Descripción</label><textarea id="pDesc" placeholder="Descripción breve..."></textarea></div>
          <div class="f-group"><label>Estado de stock</label><div class="stock-toggle-wrap"><label class="stock-toggle"><input type="checkbox" id="pInStock" checked><span class="stock-slider"></span><span class="stock-label" id="stockLabel">En stock</span></label></div></div>
          <div class="f-group"><label>Etiquetas</label>
            <div id="pTagsWrap" class="tags-wrap"></div>
            <div style="display:flex;gap:6px;margin-top:6px">
              <input type="text" id="newTagInput" placeholder="Nueva etiqueta..." style="flex:1;padding:8px;border:1px solid var(--ad-input-border);border-radius:8px;font-family:var(--f-body);font-size:.85rem;background:var(--ad-input);color:var(--ad-text)">
              <button type="button" onclick="addTag()" style="background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:.85rem">+</button>
            </div>
            <input type="hidden" id="pTags" value="">
          </div>
          <div class="f-group"><label>Imagen</label><div class="file-up" id="fileUpload"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><p>Click o arrastrá</p><input type="file" id="pImage" accept="image/*"></div></div>
        </div>
        <div id="editBanner" style="display:none;background:var(--blue-light);color:var(--blue);border-radius:8px;padding:10px 16px;margin-top:12px;font-size:.88rem;align-items:center;justify-content:space-between"><span>Editando producto existente</span><button onclick="cancelEdit()" style="background:none;border:none;color:var(--blue);cursor:pointer;font-weight:600;font-size:.85rem">✕ Cancelar</button></div>
        <button class="btn-save" id="saveProductBtn">Guardar Producto</button>
      </div>

      <!-- LISTA -->
      <div id="tabList" class="tab-c"><div class="a-list" id="adminProductsList"></div></div>

      <!-- NOVEDADES -->
      <div id="tabNovedades" class="tab-c">
        <div style="margin-bottom:20px">
          <label style="font-weight:600;margin-bottom:6px;display:block;color:var(--ad-text)">Título</label>
          <input type="text" id="novTitle" placeholder="Título de la novedad" style="width:100%;padding:10px;border:1px solid var(--ad-input-border);border-radius:8px;margin-bottom:12px;font-family:var(--f-body);background:var(--ad-input);color:var(--ad-text)">
          <label style="font-weight:600;margin-bottom:6px;display:block;color:var(--ad-text)">Descripción</label>
          <textarea id="novDesc" placeholder="Descripción..." style="width:100%;padding:10px;border:1px solid var(--ad-input-border);border-radius:8px;height:80px;margin-bottom:12px;font-family:var(--f-body);resize:vertical;background:var(--ad-input);color:var(--ad-text)"></textarea>
          <label style="font-weight:600;margin-bottom:6px;display:block;color:var(--ad-text)">Imagen (opcional)</label>
          <input type="file" id="novImage" accept="image/*" style="margin-bottom:12px;font-family:var(--f-body)">
          <button onclick="saveNovedad()" style="background:var(--accent);color:#fff;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-weight:600">Publicar novedad</button>
        </div>
        <div id="adminNovedadesList"></div>
      </div>

      <!-- ARCHIVOS -->
      <div id="tabArchivos" class="tab-c">
        <div style="margin-bottom:20px">
          <label style="font-weight:600;margin-bottom:6px;display:block;color:var(--ad-text)">Nombre del archivo</label>
          <input type="text" id="fileTitle" placeholder="Ej: Catálogo 2026, Lista de precios..." style="width:100%;padding:10px;border:1px solid var(--ad-input-border);border-radius:8px;margin-bottom:12px;font-family:var(--f-body);background:var(--ad-input);color:var(--ad-text)">
          <label style="font-weight:600;margin-bottom:6px;display:block;color:var(--ad-text)">Archivo PDF</label>
          <input type="file" id="fileUploadPDF" accept=".pdf" style="margin-bottom:12px;font-family:var(--f-body)">
          <button onclick="uploadFile()" style="background:var(--accent);color:#fff;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-weight:600">Subir archivo</button>
        </div>
        <div id="adminFilesList"></div>
      </div>

      <!-- PORTADAS -->
      <div id="tabPortadas" class="tab-c"></div>

    </div><!-- /admin-main -->
  </div><!-- /admin-layout -->
</div><!-- /admin-dash -->

    </div>
  </div>
</div>
<div id="toast" class="toast"></div>
<div id="confirmModal" class="confirm-modal"><div class="confirm-box"><p id="confirmMsg"></p><div class="confirm-btns"><button class="confirm-yes" id="confirmYes">Sí, eliminar</button><button class="confirm-no" id="confirmNo">Cancelar</button></div></div></div>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
