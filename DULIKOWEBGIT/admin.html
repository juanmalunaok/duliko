<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Duliko SRL</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>
body{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;background:var(--bg)}
.admin-page{width:100%;max-width:860px}
.admin-card{background:var(--bg-card);border-radius:var(--r);box-shadow:var(--shadow-xl);overflow:hidden}
.admin-card-head{padding:24px 32px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.admin-card-head h2{font-family:'Space Grotesk',serif;font-size:1.4rem;color:var(--text)}
.admin-back{color:var(--text2);text-decoration:none;font-size:.88rem;transition:color .2s}
.admin-back:hover{color:var(--text)}
.admin-card-body{padding:28px 32px}
@media(max-width:768px){.admin-card-head,.admin-card-body{padding:20px}}
</style>
</head>
<body>
<div class="admin-page">
  <div class="admin-card">
    <div class="admin-card-head">
      <h2>Panel Admin — Duliko SRL</h2>
      <a href="index.html" class="admin-back">← Volver al sitio</a>
    </div>
    <div class="admin-card-body">
<div class="admin-login" id="adminLogin"><p>Iniciá sesión con Google.</p><button class="g-btn" id="googleSignIn"><svg viewBox="0 0 24 24" width="20" height="20"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Ingresar con Google</button><div class="admin-error" id="adminError"></div></div><div class="admin-dash" id="adminDashboard"><div class="admin-bar"><p id="adminUser"></p><button class="btn-so" id="signOutBtn">Cerrar sesión</button></div><div class="admin-tabs"><button class="a-tab active" data-tab="add">+ Agregar</button><button class="a-tab" data-tab="list">Productos</button><button class="a-tab" data-tab="novedades">Novedades</button><button class="a-tab" data-tab="archivos">Archivos</button></div><div id="tabAdd" class="tab-c active"><div class="f-grid"><div class="f-group"><label>Nombre</label><input type="text" id="pName" placeholder="Ej: Pretzels con sésamo"></div><div class="f-group"><label>Marca</label><select id="pCat" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-family:var(--f-body)"><option value="">Seleccionar línea...</option></select><div style="display:flex;gap:6px;margin-top:6px"><input type="text" id="newBrandInput" placeholder="Nueva línea/marca..." style="flex:1;padding:8px;border:1px solid var(--border);border-radius:8px;font-family:var(--f-body);font-size:.85rem"><button type="button" onclick="addBrand()" style="background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:.85rem">+</button></div><div id="brandsList" class="tags-wrap" style="margin-top:8px"></div></div><div class="f-group full"><label>Descripción</label><textarea id="pDesc" placeholder="Descripción breve..."></textarea></div><div class="f-group"><label>Etiquetas</label><div id="pTagsWrap" class="tags-wrap"></div><div style="display:flex;gap:6px;margin-top:6px"><input type="text" id="newTagInput" placeholder="Nueva etiqueta..." style="flex:1;padding:8px;border:1px solid var(--border);border-radius:8px;font-family:var(--f-body);font-size:.85rem"><button type="button" onclick="addTag()" style="background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:.85rem">+</button></div><input type="hidden" id="pTags" value=""></div><div class="f-group"><label>Imagen</label><div class="file-up" id="fileUpload"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><p>Click o arrastrá</p><input type="file" id="pImage" accept="image/*"></div></div></div><button class="btn-save" id="saveProductBtn">Guardar Producto</button></div><div id="tabList" class="tab-c"><div class="a-list" id="adminProductsList"></div></div><div id="tabNovedades" class="tab-c"><div style="padding:16px"><label style="font-weight:600;margin-bottom:6px;display:block">Título</label><input type="text" id="novTitle" placeholder="Título de la novedad" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;margin-bottom:12px;font-family:var(--f-body)"><label style="font-weight:600;margin-bottom:6px;display:block">Descripción</label><textarea id="novDesc" placeholder="Descripción..." style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;height:80px;margin-bottom:12px;font-family:var(--f-body);resize:vertical"></textarea><label style="font-weight:600;margin-bottom:6px;display:block">Imagen (opcional)</label><input type="file" id="novImage" accept="image/*" style="margin-bottom:12px;font-family:var(--f-body)"><button onclick="saveNovedad()" style="background:var(--accent);color:#fff;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-weight:600">Publicar novedad</button></div></div><div id="tabArchivos" class="tab-c"><div style="padding:16px"><label style="font-weight:600;margin-bottom:6px;display:block">Nombre del archivo</label><input type="text" id="fileTitle" placeholder="Ej: Catálogo 2026, Lista de precios..." style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;margin-bottom:12px;font-family:var(--f-body)"><label style="font-weight:600;margin-bottom:6px;display:block">Archivo PDF</label><input type="file" id="fileUploadPDF" accept=".pdf" style="margin-bottom:12px;font-family:var(--f-body)"><button onclick="uploadFile()" style="background:var(--accent);color:#fff;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-weight:600">Subir archivo</button></div><div id="adminFilesList" style="padding:0 16px 16px"></div></div><div id="adminNovedadesList" style="padding:0 16px 16px"></div></div>
    </div>
  </div>
</div>
<div id="toast" class="toast"></div>
<div id="confirmModal" class="confirm-modal"><div class="confirm-box"><p id="confirmMsg"></p><div class="confirm-btns"><button class="confirm-yes" id="confirmYes">Sí, eliminar</button><button class="confirm-no" id="confirmNo">Cancelar</button></div></div></div>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
